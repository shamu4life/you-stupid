name = "you-stupid"
main = "src/index.js"
compatibility_date = "2025-09-01"
workers_dev = true

# Serve the real site files (page, css, js, the mp3, icons) as static assets.
# run_worker_first: route every request through the Worker so it can rewrite the
# page's unfurl-card URLs to absolute per host (assets still come from ASSETS).
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[observability]
enabled = true

# Optional: serve it from your own domain instead of *.workers.dev.
# Add the zone in the Cloudflare dashboard first, then uncomment:
# routes = [
#   { pattern = "youareanidiot.example.com", custom_domain = true }
# ]
